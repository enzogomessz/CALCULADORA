<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="comum.js" defer></script>
    <script src="interest.js" defer></script>
    <script src="calcbin.js" defer></script>
    <script src="arrow.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <title>Calculadora Pixel Game</title>
</head>
<body>

    <h1 class="titulo-topo"><span>Calculadoras</span></h1>

    <form class="carrossel" onsubmit="return false;">
        <input type="radio" name="fancy" value="comum" id="comum" checked />
        <input type="radio" name="fancy" value="juros" id="juros" />
        <input type="radio" name="fancy" value="bi" id="bi" />

        <!-- CALCULADORA COMUM -->
        <label class="tela" for="comum">
            <label class="seta-esq" for="bi">❮</label>
            <div class="calculadora-container">
                <h2 class="titulo-calculadora">Calculadora Comum</h2>
                <div class="calculadora">
                    <div class="display">
                        <input type="text" readonly value="0">
                    </div>
                    <div class="botoes">
                        <button type="button" class="btn-op">%</button><button type="button" class="btn-op">CE</button><button type="button" class="btn-op">C</button><button type="button" class="btn-op">⌫</button>
                        <button type="button" class="btn-op">¹/x</button><button type="button" class="btn-op">x²</button><button type="button" class="btn-op">²√x</button><button type="button" class="btn-op">÷</button>
                        <button type="button" class="btn-num">7</button><button type="button" class="btn-num">8</button><button type="button" class="btn-num">9</button><button type="button" class="btn-op">×</button>
                        <button type="button" class="btn-num">4</button><button type="button" class="btn-num">5</button><button type="button" class="btn-num">6</button><button type="button" class="btn-op">-</button>
                        <button type="button" class="btn-num">1</button><button type="button" class="btn-num">2</button><button type="button" class="btn-num">3</button><button type="button" class="btn-op">+</button>
                        <button type="button" class="btn-num">+/-</button><button type="button" class="btn-num">0</button><button type="button" class="btn-num">,</button><button type="button" class="btn-igual">=</button>
                    </div>
                </div>
            </div>
            <label class="seta-dir" for="juros">❯</label>
        </label>

        <!-- CALCULADORA JUROS COMPOSTOS -->
        <label class="tela" for="juros">
            <label class="seta-esq" for="comum">❮</label>
            <div class="calculadora-container">
                <h2 class="titulo-calculadora">Juros Compostos</h2>
                <div class="calculadora juros-container">
                    <div class="campo-juros">
                        <label>Valor Inicial:</label>
                        <input type="text" inputmode="decimal" placeholder="R$ 0,00">
                    </div>
                    <div class="campo-juros">
                        <label>Aporte Mensal:</label>
                        <input type="text" inputmode="decimal" placeholder="R$ 0,00">
                    </div>
                    <div class="campo-juros">
                        <label>Taxa de Juros (%):</label>
                        <input type="text" inputmode="decimal" placeholder="0.00">
                    </div>
                    <div class="campo-juros">
                        <label>Período (Meses):</label>
                        <input type="text" inputmode="numeric" placeholder="0">
                    </div>
                    <button type="button" class="btn-calcular">CALCULAR</button>
                    <div class="display display-juros">
                        <small>Resultado Total:</small>
                        <input type="text" readonly value="R$ 0,00">
                    </div>
                </div>
            </div>
            <label class="seta-dir" for="bi">❯</label>
        </label>

        <!-- CALCULADORA BINÁRIA -->
        <label class="tela" for="bi">
            <label class="seta-esq" for="juros">❮</label>
            <div class="calculadora-container">
                <h2 class="titulo-calculadora">Calculadora Binária</h2>
                <div class="calculadora">

                    <!-- Abas -->
                    <div style="display:flex; gap:10px; margin-bottom:15px;">
                        <button type="button" id="tab-calc" style="flex:1; background:#00ffff; color:#000;">CALCULAR</button>
                        <button type="button" id="tab-conv" style="flex:1; background:#000; color:#00ffff; border:2px solid #00ffff;">CONVERTER</button>
                    </div>

                    <!-- Conteúdo: Calculadora -->
                    <div id="conteudo-calc">
                        <div class="campo-juros">
                            <label>Valor 1 (binário):</label>
                            <input type="text" id="bin-v1" inputmode="numeric" placeholder="ex: 1010">
                        </div>
                        <div style="display:grid; grid-template-columns: repeat(4,1fr); gap:8px; margin:12px 0;">
                            <button type="button" class="btn-op">+</button>
                            <button type="button" class="btn-op">-</button>
                            <button type="button" class="btn-op">×</button>
                            <button type="button" class="btn-op">÷</button>
                        </div>
                        <div class="campo-juros">
                            <label>Valor 2 (binário):</label>
                            <input type="text" id="bin-v2" inputmode="numeric" placeholder="ex: 0110">
                        </div>
                        <button type="button" id="btn-calc-bi" class="btn-calcular" style="margin-top:12px;">CALCULAR</button>
                        <div class="display display-juros" style="margin-top:12px;">
                            <small>Resultado (binário):</small>
                            <input type="text" id="bin-res" readonly value="0">
                        </div>
                    </div>

                    <!-- Conteúdo: Conversor -->
                    <div id="conteudo-conv" style="display:none;">
                        <div style="display:flex; flex-direction:column; gap:10px;">

                            <div style="display:flex; align-items:center; gap:8px;">
                                <input type="radio" name="conv-base" class="radio-conv" value="2" checked style="display:inline; width:auto;">
                                <label style="color:#fff; font-size:0.55rem; flex:1;">Binário (base 2)</label>
                                <input type="text" id="conv-bin" inputmode="numeric" placeholder="0" style="width:140px;">
                            </div>

                            <div style="display:flex; align-items:center; gap:8px;">
                                <input type="radio" name="conv-base" class="radio-conv" value="8" style="display:inline; width:auto;">
                                <label style="color:#fff; font-size:0.55rem; flex:1;">Octal (base 8)</label>
                                <input type="text" id="conv-oct" readonly inputmode="numeric" placeholder="0" style="width:140px;">
                            </div>

                            <div style="display:flex; align-items:center; gap:8px;">
                                <input type="radio" name="conv-base" class="radio-conv" value="10" style="display:inline; width:auto;">
                                <label style="color:#fff; font-size:0.55rem; flex:1;">Decimal (base 10)</label>
                                <input type="text" id="conv-dec" readonly inputmode="numeric" placeholder="0" style="width:140px;">
                            </div>

                            <div style="display:flex; align-items:center; gap:8px;">
                                <input type="radio" name="conv-base" class="radio-conv" value="16" style="display:inline; width:auto;">
                                <label style="color:#fff; font-size:0.55rem; flex:1;">Hexadecimal (base 16)</label>
                                <input type="text" id="conv-hex" readonly placeholder="0" style="width:140px;">
                            </div>

                            <div style="display:flex; align-items:center; gap:8px;">
                                <input type="radio" name="conv-base" class="radio-conv" value="n" style="display:inline; width:auto;">
                                <label style="color:#fff; font-size:0.55rem; flex:1;">Base N <input type="number" id="conv-base-n" min="2" max="36" value="5" style="width:40px; font-size:0.5rem; padding:2px;"></label>
                                <input type="text" id="conv-n" readonly placeholder="0" style="width:140px;">
                            </div>

                            <div style="display:flex; align-items:center; gap:8px;">
                                <input type="radio" name="conv-base" class="radio-conv" value="x" style="display:inline; width:auto;">
                                <label style="color:#fff; font-size:0.55rem; flex:1;">Base X <input type="number" id="conv-base-x" min="2" max="36" value="12" style="width:40px; font-size:0.5rem; padding:2px;"></label>
                                <input type="text" id="conv-x" readonly placeholder="0" style="width:140px;">
                            </div>

                        </div>
                        <button type="button" id="btn-limpar-conv" class="btn-calcular" style="margin-top:12px;">LIMPAR</button>
                    </div>

                </div>
            </div>
            <label class="seta-dir" for="comum">❯</label>
        </label>

    </form>

    <footer class="rotulo">
        <p>By GASPAR, MATHEUS, MARCOS e ENZO © 2026</p>
    </footer>

</body>
</html>
